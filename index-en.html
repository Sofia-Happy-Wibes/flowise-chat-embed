<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Serapy Assistant – Training (EN)</title>
  <style>
    html, body { height: 100%; margin: 0; }
    flowise-fullchatbot { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <flowise-fullchatbot id="full"></flowise-fullchatbot>
  <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";
    try {
      const del = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.includes("flowise") || k.includes("chat"))) del.push(k);
      }
      del.forEach(k => localStorage.removeItem(k));
      sessionStorage.clear();
    } catch {}
    const qs = new URLSearchParams(location.search);
    const chatflowid = qs.get("flowId");
    const sessionId  = qs.get("sessionId");
    const apiHost    = qs.get("apiHost") || "https://flowise-production-889b.up.railway.app";
    if (!chatflowid || !sessionId) {
      document.body.innerHTML = "<p style='padding:20px;font-family:sans-serif'>Missing <code>flowId</code> or <code>sessionId</code> in the URL.</p>";
    } else {
      Chatbot.initFull({
        chatflowid,
        apiHost,
        container: document.getElementById("full"),
        chatflowConfig: { 
          sessionId 
        },
        theme: {
          chatWindow: {
            title: "Serapy AI Tutor",
            showTitle: true,
            showCloseButton: false,
            poweredByTextColor: "transparent",
            open: true,
            clearChatOnReload: true,
            welcomeMessage: "Welcome to your training. Here is the scenario you are entering."
          }
        }
      });
      
      // Auto-send "start" after widget finishes loading
      function autoStart() {
        const host = document.querySelector("flowise-fullchatbot");
        if (!host || !host.shadowRoot) {
          setTimeout(autoStart, 500);
          return;
        }
        const sr = host.shadowRoot;
        const textarea = sr.querySelector("textarea");
        if (!textarea) {
          setTimeout(autoStart, 500);
          return;
        }
        textarea.focus();
        textarea.value = "";
        document.execCommand("insertText", false, "Your scenario is loading below 👇");
        setTimeout(() => {
  const btns = sr.querySelectorAll("button");
  // Log dans la console pour déboguer si nécessaire
  console.log("Buttons found:", btns.length, [...btns].map(b => b.getAttribute("aria-label") + "|type:" + b.type + "|class:" + b.className));
  
  // Chercher le bouton d'envoi par aria-label d'abord
  let sendBtn = [...btns].find(b => 
    b.getAttribute("aria-label")?.toLowerCase().includes("send") ||
    b.type === "submit"
  );
  
  // Si pas trouvé, prendre le dernier bouton visible (fallback)
  if (!sendBtn) {
    sendBtn = [...btns].filter(b => !b.disabled).pop();
  }
  
  if (sendBtn) {
    sendBtn.click();
  } else {
    console.warn("Send button not found. Buttons available:", btns.length);
  }
}, 500);
      }
      setTimeout(autoStart, 2000);
    }
  </script>
</body>
</html>
