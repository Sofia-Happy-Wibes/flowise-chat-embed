<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Serapy Assistant – Formazione (IT)</title>
  <style>
    html, body { height: 100%; margin: 0; }
    flowise-fullchatbot { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <flowise-fullchatbot id="full"></flowise-fullchatbot>
  <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";
    try {
      const del = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.includes("flowise") || k.includes("chat"))) del.push(k);
      }
      del.forEach(k => localStorage.removeItem(k));
      sessionStorage.clear();
    } catch {}
    const qs = new URLSearchParams(location.search);
    const chatflowid = qs.get("flowId");
    const sessionId  = qs.get("sessionId");
    const apiHost    = qs.get("apiHost") || "https://flowise-production-889b.up.railway.app";
    if (!chatflowid || !sessionId) {
      document.body.innerHTML = "<p style='padding:20px;font-family:sans-serif'>Mancano i parametri <code>flowId</code> o <code>sessionId</code> nell'URL.</p>";
    } else {
      Chatbot.initFull({
        chatflowid,
        apiHost,
        container: document.getElementById("full"),
        chatflowConfig: { 
          sessionId 
          // , language: "it"
        },
        theme: {
          chatWindow: {
            title: "Serapy AI Tutor",
            showTitle: true,
            showCloseButton: false,
            poweredByTextColor: "transparent",
            open: true,
            clearChatOnReload: true,
            welcomeMessage: "Benvenuto/a alla tua formazione.\nPronto/a per iniziare?"
          }
        }
      });
      // Avvio automatico dopo il caricamento del widget
      function autoStart() {
        const host = document.querySelector("flowise-fullchatbot");
        if (!host || !host.shadowRoot) {
          setTimeout(autoStart, 500);
          return;
        }
        const sr = host.shadowRoot;
        const textarea = sr.querySelector("textarea");
        if (!textarea) {
          setTimeout(autoStart, 500);
          return;
        }
        textarea.focus();
        textarea.value = "";
        document.execCommand("insertText", false, "Il tuo scenario è in caricamento 👇");
        setTimeout(() => {
          const btns = sr.querySelectorAll("button");
          if (btns.length >= 3) {
            btns[2].click();
          }
        }, 500);
      }
      setTimeout(autoStart, 2000);
    }
  </script>
</body>
</html>
